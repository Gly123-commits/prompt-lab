<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt Lab · AI提示词工坊</title>
<style>
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#22222f;--border:#2a2a3a;--text:#e4e4ed;--text2:#9999aa;--accent:#7c6ff0;--accent2:#b896f0;--green:#4ade80;--orange:#fb923c;--red:#f87171;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
header{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:8px;align-items:center}
.container{max-width:1200px;margin:0 auto;padding:16px 20px 40px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--accent);background:rgba(124,111,240,.1)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#6a5ce0}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:var(--red)}
.btn-danger:hover{border-color:var(--red);background:rgba(248,113,113,.1)}
.cat-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.cat-tag{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit}
.cat-tag:hover{border-color:var(--accent);color:var(--text)}
.cat-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-tag.add-cat{border-style:dashed}
.editor-section{margin-bottom:20px}
.editor-section .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.editor-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.editor-body{padding:14px 18px 18px}
.editor-body textarea,.editor-body input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:10px 14px;font-family:inherit;transition:border-color .2s}
.editor-body textarea{min-height:180px;resize:vertical;font-family:'SF Mono','Fira Code',Consolas,monospace;line-height:1.7;padding:12px}
.editor-body textarea:focus,.editor-body input:focus{outline:none;border-color:var(--accent)}
.editor-body input{margin-bottom:10px}
.editor-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.cat-select{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.cat-opt{padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s;font-family:inherit}
.cat-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tags-area{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0 4px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;background:rgba(124,111,240,.15);color:var(--accent2);font-size:11px}
.tag .rm{cursor:pointer;opacity:.6;font-size:13px;line-height:1}
.tag .rm:hover{opacity:1}
.tag-input{background:transparent;border:1px dashed var(--border);border-radius:10px;color:var(--text2);font-size:11px;padding:2px 8px;width:80px;font-family:inherit}
.tag-input:focus{outline:none;border-color:var(--accent);color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card-p{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;position:relative}
.card-p:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-p .title{font-size:14px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.card-p .title .badge{font-size:10px;font-weight:400;padding:1px 7px;border-radius:8px;background:rgba(124,111,240,.15);color:var(--accent2)}
.card-p .desc{color:var(--text2);font-size:12px;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-p .preview{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:11px;background:var(--surface2);border-radius:6px;padding:8px 10px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;white-space:pre-wrap;word-break:break-all}
.card-p .meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text2)}
.card-p .meta .ts{display:flex;gap:3px;flex-wrap:wrap}
.card-p .meta .ts span{padding:1px 6px;border-radius:6px;background:var(--surface2);font-size:10px}
.card-p .ca{position:absolute;top:10px;right:10px;display:flex;gap:3px;opacity:0;transition:opacity .2s}
.card-p:hover .ca{opacity:1}
.ca .btn{padding:2px 6px;font-size:11px;background:var(--surface)}
.var-bar{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.var-btn{padding:2px 8px;border-radius:5px;background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.2);color:var(--orange);font-size:11px;cursor:pointer;font-family:'SF Mono',monospace;transition:all .2s}
.var-btn:hover{background:rgba(251,146,60,.2)}
.empty{text-align:center;padding:50px 20px;color:var(--text2)}
.empty .icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:90%;max-width:660px;max-height:80vh;overflow-y:auto;padding:22px}
.modal h2{font-size:16px;margin-bottom:12px}
.modal textarea{width:100%;min-height:250px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;line-height:1.7;padding:12px;resize:vertical;font-family:'SF Mono','Fira Code',Consolas,monospace}
.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:8px 16px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;animation:si .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.sb{display:flex;gap:8px;margin-bottom:16px}
.sb input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;font-family:inherit;transition:border-color .2s}
.sb input:focus{outline:none;border-color:var(--accent)}
@media(max-width:640px){.container{padding:10px}.grid{grid-template-columns:1fr}.cat-bar{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}header{padding:10px 14px}}
.cnt{font-size:11px;color:var(--text2);padding:1px 8px;border-radius:8px;background:var(--surface2)}
</style>
</head>
<body>
<header>
<div class="logo">✦ Prompt Lab <span style="font-weight:400;-webkit-text-fill-color:var(--text2)">· AI 提示词工坊</span></div>
<div class="header-actions">
<span class="cnt" id="cnt">0 个</span>
<button class="btn btn-sm" onclick="exportData()">📤</button>
<button class="btn btn-sm" onclick="importData()">📥</button>
<button class="btn btn-primary btn-sm" onclick="openNew()">✚ 新建</button>
</div>
</header>
<div class="container">
<div class="cat-bar" id="catBar"></div>
<div class="sb"><input id="search" placeholder="🔍 搜索标题、内容、标签…" oninput="render()"></div>
<div class="editor-section" id="editor" style="display:none">
<div class="card">
<div class="editor-header"><strong id="editorTitle">新建提示词</strong><button class="btn btn-sm" onclick="closeEditor()">✕</button></div>
<div class="editor-body">
<input id="pt" placeholder="标题（如：AI 扒谱助手）" maxlength="60">
<div class="cat-select" id="catSelect"></div>
<div class="tags-area" id="tagsArea"></div>
<div style="font-size:11px;color:var(--text2);margin:2px 0 6px;">💡 用 <code style="color:var(--accent2);background:var(--surface2);padding:1px 5px;border-radius:4px;">{变量名}</code> 做动态模板</div>
<div class="var-bar" id="varBar"></div>
<textarea id="pc" placeholder="输入提示词内容...&#10;&#10;示例：&#10;你是一位精通 {style} 的音乐制作人，分析歌曲 {song} 的 {aspect}。"></textarea>
<div class="editor-actions">
<button class="btn btn-primary" onclick="save()">💾 保存</button>
<button class="btn" onclick="preview()">👁 预览</button>
<button class="btn" onclick="addVar()">✚ 变量</button>
<button class="btn" onclick="clearEditor()">清空</button>
</div></div></div></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty"><div class="icon">✦</div><h3>还没有提示词</h3><p>点击「新建」开始创建</p></div>
</div>
<div class="modal-overlay" id="modal">
<div class="modal">
<h2 id="modalTitle">提示词</h2>
<div id="modalMeta" style="font-size:12px;color:var(--text2);margin-bottom:10px"></div>
<textarea id="modalContent" readonly></textarea>
<div class="modal-actions">
<button class="btn btn-sm" id="copyBtn" onclick="copyModal()">📋 复制</button>
<button class="btn btn-sm" onclick="editModal()">✏ 编辑</button>
<button class="btn btn-sm" onclick="closeModal()">关闭</button>
</div></div></div>
<div class="toasts" id="toasts"></div>
<script>
let P=[],C=['通用'],cur='全部',eid=null,ets=[],ecat='通用';
function L(){try{const d=JSON.parse(localStorage.getItem('pl'));if(d){P=d.p||[];C=d.c||['通用']}}catch(e){}}
function S(){localStorage.setItem('pl',JSON.stringify({p:P,c:C}))}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function renderCat(){
const b=document.getElementById('catBar');
let h=`<button class="cat-tag ${cur==='全部'?'active':''}" onclick="setC('全部')">全部 (${P.length})</button>`;
C.forEach(c=>{const n=P.filter(p=>p.cat===c).length;h+=`<button class="cat-tag ${cur===c?'active':''}" onclick="setC('${c}')">${c} (${n})</button>`});
h+=`<button class="cat-tag add-cat" onclick="addC()">✚</button>`;
b.innerHTML=h;
}
function setC(c){cur=c;renderCat();render()}
function addC(){
const n=prompt('新分类名：');
if(n&&n.trim()&&!C.includes(n.trim())){C.push(n.trim());S();renderCat();updCatSel();toast(`已建「${n.trim()}」`)}
}
function updCatSel(){
const el=document.getElementById('catSelect');
const sc=eid?P.find(p=>p.id===eid)?.cat||'通用':ecat;
el.innerHTML=C.map(c=>`<span class="cat-opt ${c===sc?'active':''}" onclick="selC('${c}')">${c}</span>`).join('');
}
function selC(c){ecat=c;document.querySelectorAll('.cat-opt').forEach(el=>el.classList.toggle('active',el.textContent===c))}
function renderTags(){
const a=document.getElementById('tagsArea');
let h=ets.map(t=>`<span class="tag">${t}<span class="rm" onclick="rmTag('${t}')">×</span></span>`).join('');
h+=`<input class="tag-input" id="ti" placeholder="+标签" onkeydown="tgKey(event)">`;
a.innerHTML=h;
}
function tgKey(e){
if(e.key==='Enter'){const v=e.target.value.trim();if(v&&!ets.includes(v)){ets.push(v);renderTags();updVar()}e.target.value=''}
}
function rmTag(t){ets=ets.filter(x=>x!==t);renderTags();updVar()}
function updVar(){
const c=document.getElementById('pc').value;
const s=new Set();let m;const re=/\{(\w+)\}/g;while((m=re.exec(c)))s.add(m[1]);
document.getElementById('varBar').innerHTML=s.size===0?'<span style="font-size:11px;color:var(--text2)">未检测到变量</span>':Array.from(s).map(v=>`<span class="var-btn" onclick="cpv('{${v}}')">{${v}}</span>`).join('');
}
function addVar(){const n=prompt('变量名：');if(n&&n.trim()){document.getElementById('pc').value+=`{n.trim()}}`;updVar()}}
function cpv(v){navigator.clipboard.writeText(v).then(()=>toast(`已复制 ${v}`))}
function openNew(){
eid=null;ets=[];ecat='通用';
document.getElementById('editorTitle').textContent='✦ 新建提示词';
document.getElementById('pt').value='';
document.getElementById('pc').value='';
document.getElementById('editor').style.display='block';
updCatSel();renderTags();updVar();
document.getElementById('pt').focus();
window.scrollTo({top:0,behavior:'smooth'});
}
function editP(id){
const p=P.find(x=>x.id===id);if(!p)return;
eid=id;ets=[...(p.tags||[])];ecat=p.cat;
document.getElementById('editorTitle').textContent=`✏ ${p.title}`;
document.getElementById('pt').value=p.title;
document.getElementById('pc').value=p.content;
document.getElementById('editor').style.display='block';
updCatSel();renderTags();updVar();
window.scrollTo({top:0,behavior:'smooth'});
}
function closeEditor(){document.getElementById('editor').style.display='none';eid=null}
function save(){
const t=document.getElementById('pt').value.trim(),c=document.getElementById('pc').value.trim();
if(!t)return toast('请输入标题','err');
if(!c)return toast('请输入内容','err');
const vs=new Set();let m;const re=/\{(\w+)\}/g;while((m=re.exec(c)))vs.add(m[1]);
if(eid){const i=P.findIndex(p=>p.id===eid);if(i>-1)P[i]={...P[i],title:t,content:c,cat:ecat||'通用',tags:[...ets],vars:Array.from(vs),updatedAt:Date.now()};toast('已更新')}
else{P.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),title:t,content:c,cat:ecat||'通用',tags:[...ets],vars:Array.from(vs),createdAt:Date.now(),updatedAt:Date.now(),use:0});toast('已保存')}
S();closeEditor();renderCat();render();updCnt()
}
function delP(id){const p=P.find(x=>x.id===id);if(!p||!confirm(`删「${p.title}」？`))return;P=P.filter(x=>x.id!==id);S();renderCat();render();updCnt();toast('已删')}
function dupP(id){const p=P.find(x=>x.id===id);if(!p)return;P.unshift({...p,id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),title:p.title+' (副本)',createdAt:Date.now(),updatedAt:Date.now(),use:0});S();renderCat();render();updCnt();toast('已复制')}
function render(){
const g=document.getElementById('grid'),e=document.getElementById('empty');
const q=document.getElementById('search').value.toLowerCase().trim();
let f=P;if(cur!=='全部')f=f.filter(p=>p.cat===cur);
if(q)f=f.filter(p=>p.title.toLowerCase().includes(q)||p.content.toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q)));
if(!f.length){g.innerHTML='';e.style.display='block';return}
e.style.display='none';
g.innerHTML=f.map(p=>{
const prev=p.content.length>130?p.content.slice(0,130)+'…':p.content;
const ts=(p.tags||[]).map(t=>`<span>${t}</span>`).join('');
const tm=new Date(p.updatedAt||p.createdAt).toLocaleDateString('zh-CN');
const vs=p.vars?.length?`<span style="color:var(--orange);font-size:10px;">${p.vars.map(v=>'{'+v+'}').join(' ')}</span>`:'';
return `<div class="card-p" onclick="view('${p.id}')">
<div class="ca" onclick="event.stopPropagation()">
<button class="btn btn-sm" onclick="editP('${p.id}')">✏</button>
<button class="btn btn-sm" onclick="dupP('${p.id}')">📋</button>
<button class="btn btn-sm btn-danger" onclick="delP('${p.id}')">🗑</button>
</div>
<div class="title">${esc(p.title)}<span class="badge">${p.cat}</span></div>
<div class="preview">${esc(prev)}</div>
<div class="meta"><div class="ts">${ts}</div><div style="display:flex;gap:6px;align-items:center">${vs}<span>${tm}</span></div></div>
</div>`}).join('');
}
function updCnt(){document.getElementById('cnt').textContent=`${P.length} 个`}
let _vid=null;
function view(id){
const p=P.find(x=>x.id===id);if(!p)return;
p.use=(p.use||0)+1;S();
document.getElementById('modalTitle').textContent=p.title;
let m=`<span style="background:rgba(124,111,240,.15);color:var(--accent2);padding:1px 8px;border-radius:8px;font-size:11px">${p.cat}</span>`;
m+=` <span style="margin-left:6px;font-size:11px">🗓 ${new Date(p.updatedAt||p.createdAt).toLocaleString('zh-CN')}</span>`;
if(p.use)m+=` <span style="margin-left:6px;font-size:11px">👁 ${p.use}次</span>`;
if(p.tags?.length)m+=`<div style="margin-top:4px">${p.tags.map(t=>`<span style="display:inline-block;padding:1px 6px;border-radius:6px;background:var(--surface2);font-size:10px;margin:1px">${t}</span>`).join('')}</div>`;
document.getElementById('modalMeta').innerHTML=m;
document.getElementById('modalContent').value=p.content;
document.getElementById('modalContent').readOnly=true;
document.getElementById('modal').classList.add('show');
_vid=id;
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function editModal(){const id=_vid;closeModal();if(id)editP(id)}
function copyModal(){const ta=document.getElementById('modalContent');navigator.clipboard.writeText(ta.value).then(()=>{toast('已复制');document.getElementById('copyBtn').textContent='✅ 已复制';setTimeout(()=>document.getElementById('copyBtn').textContent='📋 复制',2000)})}
function preview(){
let c=document.getElementById('pc').value;const s=new Set();let m;const re=/\{(\w+)\}/g;while((m=re.exec(c)))s.add(m[1]);
if(!s.size){document.getElementById('modalContent').value=c;document.getElementById('modalTitle').textContent='👁 预览';document.getElementById('modalMeta').innerHTML='';document.getElementById('modal').classList.add('show');return}
let ok=true,r=c;for(const v of s){const val=prompt(`「${v}」的值：`,'');if(val===null){ok=false;break}r=r.replace(new RegExp(`\\{${v}\\}`,'g'),val)}
if(ok){document.getElementById('modalContent').value=r;document.getElementById('modalTitle').textContent='👁 预览（已替换）';document.getElementById('modalMeta').innerHTML='';document.getElementById('modal').classList.add('show')}
}
function clearEditor(){if(!confirm('清空编辑器？'))return;document.getElementById('pt').value='';document.getElementById('pc').value='';ets=[];renderTags();updVar()}
function toast(msg,t){const c=document.getElementById('toasts');const e=document.createElement('div');e.className='toast';e.textContent=msg;c.appendChild(e);setTimeout(()=>e.remove(),2500)}
function exportData(){const blob=new Blob([JSON.stringify({prompts:P,categories:C},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`promptlab_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('已导出')}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.prompts){if(!confirm(`导入 ${d.prompts.length} 个，覆盖当前？\n（取消则合并）`)){const es=new Set(P.map(p=>p.id));P=[...P,...d.prompts.filter(p=>!es.has(p.id))];C=[...new Set([...C,...(d.categories||[])])]}else{P=d.prompts;C=d.categories||['通用']}S();renderCat();render();updCnt();toast(`已导入，共 ${P.length} 个`)}}catch(e){toast('导入失败','err')}};r.readAsText(f)};inp.click()}
document.addEventListener('keydown',e=>{
if(e.key==='Escape'){if(document.getElementById('modal').classList.contains('show'))closeModal();else if(document.getElementById('editor').style.display==='block')closeEditor()}
if((e.ctrlKey||e.metaKey)&&e.key==='s'&&document.getElementById('editor').style.display==='block'){e.preventDefault();save()}
});
L();renderCat();render();updCnt();
document.getElementById('pc').addEventListener('input',updVar);
</script>
</body>
</html>
